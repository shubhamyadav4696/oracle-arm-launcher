name: Launch Oracle ARM VM

# Lands an Always-Free ARM instance the moment Oracle has capacity.
# Each run LOOPS internally (retry every 2 min for ~5h50m) because GitHub's
# scheduler fires unreliably — one long-running job covers the gaps. The
# schedule restarts a fresh loop a few times a day. Skips if the instance
# already exists (no duplicates). Runs on GitHub, so no local machine needed.

on:
  schedule:
    - cron: '7 */6 * * *'        # ~every 6h; each run then loops for ~6h
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      OCI_CLI_USER:        ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY:     ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION:      ${{ secrets.OCI_CLI_REGION }}
      COMPARTMENT:         ${{ secrets.OCI_CLI_TENANCY }}
      AD:     "xlti:AP-MUMBAI-1-AD-1"
      SUBNET: "ocid1.subnet.oc1.ap-mumbai-1.aaaaaaaaj5h5yefhcr4kzrsljb4qk2ih3qlqnxmu4bhqrxoix7ys3mge7yla"
      IMAGE:  "ocid1.image.oc1.ap-mumbai-1.aaaaaaaalh3kwqptzhc64v73fv2zh5uw65ih54tnmfjaq2mlu3mo4me2dd5a"
    steps:
      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      - name: Retry-launch loop (~5h50m)
        run: |
          printf '%s\n' "${{ secrets.OCI_SSH_PUBKEY }}" > /tmp/id.pub
          START=$(date +%s)
          MAX=21000          # 5h50m; exit before the 6h job timeout
          n=0
          while true; do
            if [ $(( $(date +%s) - START )) -ge $MAX ]; then
              echo "Time budget reached — next scheduled run will continue."; exit 0
            fi
            n=$((n+1))

            COUNT=$(oci compute instance list -c "$COMPARTMENT" \
              --display-name trading-bot \
              --query "length(data[?\"lifecycle-state\"!='TERMINATED'])" \
              --raw-output 2>/dev/null)
            COUNT=$(printf '%s' "$COUNT" | tr -dc '0-9'); [ -z "$COUNT" ] && COUNT=0
            if [ "$COUNT" -gt 0 ]; then
              echo "::notice::Instance already exists — done."; exit 0
            fi

            echo "--- attempt $n ($(date -u '+%H:%M:%S') UTC) ---"
            set +e
            OUT=$(oci compute instance launch \
              --availability-domain "$AD" \
              --compartment-id "$COMPARTMENT" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":1,"memoryInGBs":6}' \
              --image-id "$IMAGE" \
              --subnet-id "$SUBNET" \
              --assign-public-ip true \
              --display-name "trading-bot" \
              --ssh-authorized-keys-file /tmp/id.pub \
              --wait-for-state RUNNING 2>&1)
            CODE=$?
            set -e
            if [ $CODE -eq 0 ]; then
              echo "::notice::SUCCESS — instance launched and RUNNING"
              echo "$OUT" | grep -iE '"id"|lifecycle-state' | head -5
              exit 0
            elif echo "$OUT" | grep -qi "capacity"; then
              echo "no capacity; retrying in 120s"
              sleep 120
            else
              echo "::error::Non-capacity failure:"; echo "$OUT" | tail -20
              exit 1
            fi
          done
